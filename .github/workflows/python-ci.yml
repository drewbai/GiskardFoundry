name: Python CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package and lint tooling
        run: |
          pip install .
          pip install flake8

      - name: Run flake8 linting
        run: |
          flake8 src/giskardfoundry --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/giskardfoundry --count --max-complexity=10 --max-line-length=100 --statistics

      - name: Run import checks
        run: |
          python -c "import giskardfoundry"
          python -c "from giskardfoundry import GFConfig, PromptRegistry, Agent"
          python -c "cfg = GFConfig.from_env(); reg = PromptRegistry.from_config(cfg); agent = Agent(prompt='hello'); print(agent.run({'ping': 'pong'})['status'])"

      - name: Ensure package is importable
        run: python -c "import importlib.util; assert importlib.util.find_spec('giskardfoundry') is not None"
